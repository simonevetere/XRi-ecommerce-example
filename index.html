<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://xri.onl/XRi.js"></script>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        /* BASE DARK THEME */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* HEADER */
        nav {
            background: #0a0a0a;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; color: #fff; }
        .cart-status { color: #00ff41; font-family: monospace; font-size: 1.1rem; font-weight: bold; }

        /* HERO */
        .hero {
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .hero h1 { font-size: 3rem; text-transform: uppercase; margin-bottom: 15px; letter-spacing: -1px; }
        .hero p { color: #888; font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

        /* GRID */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* PRODUCT CARD */
        .card {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 25px;
            transition: all 0.3s ease;
            text-align: center;
        }
        .card:hover {
            border-color: #00d1ff;
            background: #111;
            transform: translateY(-5px);
        }
        
        /* IMAGE BOX / MODEL VIEWER */
        .img-box {
            height: 300px;
            background: #050505;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 1px solid #1a1a1a;
            overflow: hidden;
        }
        
        model-viewer { 
            width: 100%; 
            height: 100%; 
            --poster-color: transparent; 
        }

        .card h3 { font-size: 1.4rem; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .price { font-size: 1.8rem; margin: 15px 0; font-weight: 800; color: #fff; }

        /* BUTTONS */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        
        .btn-cart {
            background: #fff; color: #000; border: none;
            padding: 15px; border-radius: 8px; font-weight: 800;
            font-size: 1rem; cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }
        .btn-cart:hover { opacity: 0.9; }
        
        .btn-xr {
            background: transparent; color: #00d1ff;
            border: 1.5px solid #00d1ff; padding: 12px;
            border-radius: 8px; font-weight: 700; 
            font-size: 0.9rem; cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-xr:hover { background: #00d1ff; color: #000; }

        /* LOG OVERLAY */
        #xr-status {
            position: fixed; bottom: 20px; left: 20px;
            font-size: 0.9rem; color: #00ff41; font-family: monospace;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px;
            display: none;
        }
        
        model-viewer {
            background-color: #7d7d7d;
            border-radius: 8px; 
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">XRi WEAR</div>
        <div class="cart-status">CART: [<span id="count">0</span>]</div>
    </nav>

    <div class="hero">
        <h1>Tech Collection 2026</h1>
        <p>Experience our garments in Augmented Reality powered by XRi technology.</p>
    </div>

    <div class="container">
        <div class="product-grid">
            
            <div class="card">
                <div class="img-box">
                    <model-viewer src="https://raw.githubusercontent.com/simonevetere/XRi-ecommerce-example/main/assets/3d/jacket.glb" 
                                  auto-rotate 
                                  camera-controls 
                                  disable-zoom 
                                  shadow-intensity="1">
                    </model-viewer>
                </div>
                <h3>XR-1 Jacket</h3>
                <div class="price">€ 189.00</div>
                <div class="btn-group">
                    <button class="btn-cart" onclick="updateCart()">ADD TO CART</button>
                    <button class="btn-xr" onclick="launchXR('https://raw.githubusercontent.com/simonevetere/XRi-ecommerce-example/main/assets/3d/jacket.glb')">VIEW IN 3D / XR</button>
                </div>
            </div>

            <div class="card">
                <div class="img-box">
                    <model-viewer src="https://raw.githubusercontent.com/simonevetere/XRi-ecommerce-example/main/assets/3d/trousers.glb" 
                                  auto-rotate 
                                  camera-controls 
                                  disable-zoom 
                                  shadow-intensity="1">
                    </model-viewer>
                </div>
                <h3>Tech Pants</h3>
                <div class="price">€ 189.00</div>
                <div class="btn-group">
                    <button class="btn-cart" onclick="updateCart()">ADD TO CART</button>
                    <button class="btn-xr" onclick="launchXR('https://raw.githubusercontent.com/simonevetere/XRi-ecommerce-example/main/assets/3d/trousers.glb')">VIEW IN 3D / XR</button>
                </div>
            </div>

            <div class="card">
                <div class="img-box">
                    <model-viewer src="https://raw.githubusercontent.com/simonevetere/XRi-ecommerce-example/main/assets/3d/t-shirt.glb" 
                                  auto-rotate 
                                  camera-controls 
                                  disable-zoom 
                                  shadow-intensity="1">
                    </model-viewer>
                </div>
                <h3>Signature T-Shirt</h3>
                <div class="price">€ 189.00</div>
                <div class="btn-group">
                    <button class="btn-cart" onclick="updateCart()">ADD TO CART</button>
                    <button class="btn-xr" onclick="launchXR('https://raw.githubusercontent.com/simonevetere/XRi-ecommerce-example/main/assets/3d/t-shirt.glb')">VIEW IN 3D / XR</button>
                </div>
            </div>
        </div>
    </div>

    <div id="xr-status"></div>

    <script>
    async function launchXR(modelPath) {
        // Determine real-world size in meters based on the garment type
        let garmentSize = 1.5; // Default fallback size
        
        if (typeof XRi !== 'undefined') {
            if (modelPath.includes('jacket')) {
                garmentSize = 0.80; // Jacket: 80 cm
                XRi.spawn("jacket", modelPath, garmentSize, { x: 0, y: 1, z: 0.5 },{ x: 0, y: 180, z: 0 }, true);
            } else if (modelPath.includes('trousers')) {
                garmentSize = 1.00; // Trousers: 100 cm
                XRi.spawn("trousers", modelPath, garmentSize, { x: 0, y: 1, z: 0.5 },{ x: 0, y: 180, z: 0 }, true);
            } else if (modelPath.includes('t-shirt')) {
                garmentSize = 0.70; // T-shirt: 70 cm
                XRi.spawn("shirt", modelPath, garmentSize, { x: 0, y: 1, z: 0.5 },{ x: 0, y: 180, z: 0 }, true);
            }
                
        }
    };

    function updateCart () {
        let countEl = document.getElementById('count');
        let current = parseInt(countEl.innerText);
        countEl.innerText = current + 1;
    };

    if (typeof XRi !== 'undefined') {
        // Initializes multiplayer features for the XR session
        XRi.initMultiplayer();
        // Sets up the WebXR environment
        XRi.initWebXR();
        // Clears any previously loaded items from the scene
        XRi.clearAll();
    }
    </script>
</body>
</html>
